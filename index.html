<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neural Net AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      color: #333;
      overflow-x: hidden;
    }

    .container {
      max-width: 700px;
      width: 100%;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.9);
      text-align: center;
      margin-bottom: 30px;
      font-weight: 400;
    }

    textarea {
      width: 100%;
      height: 100px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 16px;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      color: #fff;
      resize: vertical;
      transition: all 0.3s ease;
      outline: none;
    }

    textarea::placeholder {
      color: rgba(255, 255, 255, 0.7);
    }

    textarea:focus {
      border-color: rgba(255, 255, 255, 0.6);
      background: rgba(255, 255, 255, 0.25);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.1);
    }

    button {
      width: 100%;
      padding: 16px 32px;
      margin-top: 16px;
      background: linear-gradient(135deg, #ff6b6b, #feca57);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 1.1rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(254, 202, 87, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 40px rgba(254, 202, 87, 0.5);
      background: linear-gradient(135deg, #ff8e8e, #fed766);
    }

    button:active {
      transform: translateY(0);
    }

    #answer {
      margin-top: 30px;
      padding: 24px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      min-height: 120px;
      white-space: pre-wrap;
      color: #fff;
      font-size: 1rem;
      line-height: 1.6;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #answer.thinking {
      background: linear-gradient(90deg, #667eea, #764ba2);
      background-size: 200% 200%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    #followups h3 {
      margin-top: 16px;
      color: #fff;
      font-size: 1rem;
    }

    #followups ul {
      margin-top: 8px;
      list-style: none;
      padding-left: 0;
    }

    #followups li {
      margin-bottom: 6px;
    }

    #followups a {
      color: #ffeaa7;
      text-decoration: underline;
      cursor: pointer;
      font-size: 0.95rem;
    }

    @media (max-width: 768px) {
      .container {
        padding: 24px;
        margin: 10px;
      }
      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Neural Net: Ask Anything! </h1>
    <p class="subtitle">Ask me anything, really!</p>
    <textarea id="question" placeholder="Type your question here..."></textarea>
    <br>
    <button onclick="ask()">Answer</button>
    <div id="answer"></div>
    <div id="followups"></div>
  </div>

  <script>
    const followupsDiv = document.getElementById('followups');

    function renderFollowups(followups) {
      if (!followups || !Array.isArray(followups) || !followups.length) {
        followupsDiv.innerHTML = "";
        return;
      }

      followupsDiv.innerHTML = `
        <h3>Follow-ups</h3>
        <ul>
          ${followups.map(q => `
            <li>
              <a href="#" class="followup-link">${q}</a>
            </li>
          `).join('')}
        </ul>
      `;

      document.querySelectorAll('.followup-link').forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const text = e.target.textContent;
          document.getElementById('question').value = text;
          ask();
        });
      });
    }

    async function ask() {
      const question = document.getElementById('question').value.trim();
      const answerDiv = document.getElementById('answer');

      if (!question) {
        answerDiv.textContent = "Please enter a question.";
        answerDiv.classList.remove('thinking');
        followupsDiv.innerHTML = "";
        return;
      }

      answerDiv.textContent = "🤔 Thinking...";
      answerDiv.className = 'thinking';
      followupsDiv.innerHTML = "";

      try {
        const res = await fetch('https://economy-repairs-aims-modes.trycloudflare.com/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        });

        const data = await res.json();

        if (data.error) {
          answerDiv.textContent = "Error: " + data.error;
        } else {
          // Only show the answer text
          const text = (data.answer || "").trim();
          answerDiv.textContent = text;

          // Then show follow-up hyperlinks
          renderFollowups(data.followups);
        }
      } catch (e) {
        answerDiv.textContent = "Request failed: " + e.message;
      }

      answerDiv.classList.remove('thinking');
    }

    // Allow Ctrl+Enter to submit
    document.getElementById('question').addEventListener('keypress', function(e) {
      if (e.key === 'Enter' && e.ctrlKey) {
        ask();
      }
    });
  </script>
</body>
</html>
